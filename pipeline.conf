# Pipeline Configuration
# 
# All parameters have defaults that have yielded reasonable results.
# Modify values below to adjust pipeline behavior for your data. 
# Used by: analyze_configs.py, train_long.py and model_diagnostics.py 
# using --conf pipeline.conf

[ssd]
# Steady-State Detection (CAS analysis)
# Determines where warmup ends in each benchmark run.
# window_size = clip(n * window_fraction, window_min, window_max)
# threshold   = max(compilation_time) * threshold_fraction
window_fraction = 0.10
window_min = 5
window_max = 50
threshold_fraction = 0.009

[anomaly_flagging]
# A version transition is flagged as anomalous if BOTH conditions are met:
#   1. distance > P(threshold_percentile) of all distances in the config
#   2. z-score of the distance >= min_z_score
#
# distance_metric chooses how embeddings are compared:
#   cosine    - angular distance, magnitude-invariant. Good when the
#               temporal shape is the signal of interest.
#   euclidean - full distance, sensitive to magnitude too. Good when
#               scale shifts in the embedding matter (e.g., benchmarks
#               whose iteration-time level changes between versions but
#               whose temporal shape is mostly stable).
#   l1        - Manhattan distance. More robust to per-dimension
#               outliers in the embedding.
#
# Note: z-score and percentile gates are distribution-relative, so
# changing distance_metric does not require re-tuning these gates --
# but the raw distance numbers in reports will be on very different
# scales between metrics (cosine in [0, 2], euclidean and l1 unbounded).
distance_metric = cosine
threshold_percentile = 97.0
min_z_score = 2.0

[reliability]
# Per-config reliability scoring. Each condition below triggers a warning.
# 0 warnings = STRONG, 1 = WEAK, 2+ = RECOMMEND-SKIP
mean_dist_threshold = 0.35
length_ratio_threshold = 5.0
min_versions = 10
min_max_z_score = 1.5

[cross_config]
# Cross-configuration corroboration confidence levels.
# Groups flagged transitions by (benchmark, platform, version_pair) across
# all hosts and GC configs. Confidence based on ratio = n_flagged / n_total:
#   STRONG:        ratio >= strong_ratio
#   MODERATE:      ratio >= moderate_ratio AND n_flagged >= min_flagged_for_moderate
#   WEAK:          n_flagged >= min_flagged_for_weak (but below moderate_ratio)
#   SINGLE-CONFIG: flagged in only 1 config
#   N/A:           only 1 config exists for this config
# Note: We consider one config flagged out of 2 as STRONG evidence and not a SINGLE-CONFIG case.
strong_ratio = 0.40
moderate_ratio = 0.20
min_flagged_for_moderate = 2
min_flagged_for_weak = 2

[training]
# TS2Vec encoder training parameters.
epochs = 40
batch_size = 64
learning_rate = 0.001
hidden_dim = 128
repr_dim = 320
depth = 10
mask_ratio = 0.5
weight_decay = 0.0001
eta_min = 0.000001
